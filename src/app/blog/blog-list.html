<div class="blog-page">
  <a routerLink="/" class="back-link">← Back to portfolio</a>

  <header class="blog-page-header">
    <h1>Writing</h1>
    <p>Notes on shipping client work, AI integration, and web development.</p>
  </header>

  <div class="blog-grid">
    <article class="blog-card" *ngFor="let post of posts">
      <div class="blog-meta">
        <time>{{ post.date }}</time>
        <span class="read-time">{{ post.readTime }} read</span>
      </div>
      <h2>
        <a [routerLink]="['/blog', post.slug]">{{ post.title }}</a>
      </h2>
      <p class="blog-excerpt">{{ post.excerpt }}</p>
      <div class="blog-tags">
        <span class="blog-tag" *ngFor="let tag of post.tags">{{ tag }}</span>
      </div>
      <a [routerLink]="['/blog', post.slug]" class="read-more">Read article →</a>
    </article>
  </div>
</div>
