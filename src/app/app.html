<!-- Navigation -->
<nav class="navbar">
  <div class="nav-container">
    <div class="logo">{{ fullName }}</div>
    <ul class="nav-links" [class.open]="menuOpen">
      <li *ngFor="let section of sections">
        <a
          routerLink="/"
          [fragment]="section"
          [class.active]="activeSection === section"
          (click)="closeMenu()"
        >{{ section | titlecase }}</a>
      </li>
    </ul>
    <div class="nav-actions">
      <button class="theme-toggle" (click)="toggleDarkMode()" [attr.aria-label]="isDarkMode ? 'Switch to light mode' : 'Switch to dark mode'">
        {{ isDarkMode ? '☀️' : '🌙' }}
      </button>
      <button class="hamburger" (click)="toggleMenu()" aria-label="Toggle menu">
        <span [class.open]="menuOpen"></span>
        <span [class.open]="menuOpen"></span>
        <span [class.open]="menuOpen"></span>
      </button>
    </div>
  </div>
</nav>

<!-- Hero Section -->
<section id="home" class="hero section">
  <app-hero></app-hero>
</section>

<main>
  <!-- About Section -->
  <section id="about" class="about section">
    <app-about></app-about>
  </section>

  <!-- Experience Section -->
  <section id="experience" class="experience section">
    <app-experience></app-experience>
  </section>

  <!-- Skills Section -->
  <section id="skills" class="skills section">
    <app-skills></app-skills>
  </section>

  <!-- Projects Section -->
  <section id="projects" class="projects section">
    <app-projects></app-projects>
  </section>

  <!-- GitHub Activity Section -->
  <section id="github" class="github-activity section">
    <div class="section-header">
      <h2 class="section-title">GitHub Activity</h2>
      <p class="section-subtitle">My recent contributions and coding activity</p>
    </div>
    <app-github-activity></app-github-activity>
  </section>

  <!-- Education Section -->
  <section id="education" class="education section">
    <app-education></app-education>
  </section>

  <!-- Certifications Section -->
  <section id="certifications" class="certifications section">
    <app-certifications></app-certifications>
  </section>

  <!-- Testimonials Section -->
  <section id="testimonials" class="testimonials section">
    <app-testimonials></app-testimonials>
  </section>

  <!-- Contact Section -->
  <section id="contact" class="contact section">
    <app-contact></app-contact>
  </section>
</main>

<!-- Back to Top -->
<button class="back-to-top" [class.visible]="showBackToTop" (click)="scrollToTop()" aria-label="Back to top">
  ↑
</button>

<!-- Footer -->

<footer class="footer">
  <div class="container">
    <div class="social-links">
      <a
        *ngFor="let social of socialLinks"
        [href]="social.url"
        target="_blank"
        class="social-link"
        [title]="social.platform"
        style="font-size: 1.5em; margin: 0 0.5em; text-decoration: none"
      >
        <span [attr.aria-label]="social.platform" role="img"
          >{{ social.icon }}</span
        >
      </a>
    </div>
    <p>&copy; {{ currentYear }} {{ fullName }}. All rights reserved.</p>
  </div>
</footer>
