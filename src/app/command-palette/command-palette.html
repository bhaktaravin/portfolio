<div
  class="palette-overlay"
  *ngIf="isOpen()"
  (click)="close()"
  role="presentation"
>
  <div
    class="palette-dialog"
    role="dialog"
    aria-modal="true"
    aria-label="Command menu"
    (click)="$event.stopPropagation()"
  >
    <div class="palette-search">
      <span class="palette-icon" aria-hidden="true">⌕</span>
      <input
        #searchInput
        type="search"
        class="palette-input"
        [(ngModel)]="query"
        (ngModelChange)="onQueryChange()"
        placeholder="Jump to a section, project, or blog post…"
        aria-label="Search commands"
        autocomplete="off"
      />
      <kbd class="palette-kbd">esc</kbd>
    </div>

    <div class="palette-results" *ngIf="filteredItems.length; else noResults">
      <div class="palette-group" *ngFor="let group of groupedItems | keyvalue">
        <p class="palette-group-label">{{ group.key }}</p>
        <button
          type="button"
          class="palette-item"
          *ngFor="let item of group.value"
          [class.selected]="isSelected(item)"
          (click)="selectItem(item)"
          (mouseenter)="selectedIndex = flatIndex(item)"
        >
          <span class="palette-item-label">{{ item.label }}</span>
          <span class="palette-item-hint" *ngIf="item.hint">{{ item.hint }}</span>
        </button>
      </div>
    </div>

    <ng-template #noResults>
      <p class="palette-empty">No matches for “{{ query }}”</p>
    </ng-template>

    <div class="palette-footer">
      <span><kbd>↑</kbd><kbd>↓</kbd> navigate</span>
      <span><kbd>↵</kbd> go</span>
      <span><kbd>⌘K</kbd> toggle</span>
    </div>
  </div>
</div>
