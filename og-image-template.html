<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #f5f6fa;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 1200px;
      height: 630px;
      position: relative;
      display: flex;
      align-items: center;
      padding: 80px;
      overflow: hidden;
    }

    /* Background gradient blobs */
    .blob-1 {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(79, 140, 255, 0.15) 0%, transparent 70%);
      top: -100px;
      right: -100px;
    }

    .blob-2 {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.12) 0%, transparent 70%);
      bottom: -80px;
      left: 200px;
    }

    /* Grid lines */
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(79, 140, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79, 140, 255, 0.05) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .content {
      position: relative;
      z-index: 1;
      flex: 1;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(79, 140, 255, 0.15);
      border: 1px solid rgba(79, 140, 255, 0.3);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 14px;
      color: #4f8cff;
      font-weight: 500;
      margin-bottom: 24px;
      letter-spacing: 0.5px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4f8cff;
      animation: pulse 2s infinite;
    }

    h1 {
      font-size: 72px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #ffffff 0%, #b3c6ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .title {
      font-size: 24px;
      color: #4f8cff;
      font-weight: 500;
      margin-bottom: 32px;
    }

    .tech-stack {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .tech {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 14px;
      color: #9ca3af;
      font-weight: 500;
    }

    .right {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .avatar {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4f8cff, #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      font-weight: 800;
      color: white;
      box-shadow: 0 0 60px rgba(79, 140, 255, 0.3);
    }

    .url {
      font-size: 15px;
      color: #6b7280;
      letter-spacing: 0.5px;
    }

    /* Bottom bar */
    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #4f8cff, #7c3aed, #ec4899);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="grid"></div>
    <div class="blob-1"></div>
    <div class="blob-2"></div>

    <div class="content">
      <div class="tag">
        <div class="dot"></div>
        Available for opportunities
      </div>
      <h1>Ravin Bhakta</h1>
      <div class="title">Full-Stack Engineer · Enterprise & Cloud</div>
      <div class="tech-stack">
        <span class="tech">Angular</span>
        <span class="tech">React</span>
        <span class="tech">Java Spring</span>
        <span class="tech">Python</span>
        <span class="tech">AWS</span>
        <span class="tech">TypeScript</span>
      </div>
    </div>

    <div class="right">
      <div class="avatar">RB</div>
      <div class="url">ravinbhaktaresume.netlify.app</div>
    </div>

    <div class="bottom-bar"></div>
  </div>
</body>
</html>
